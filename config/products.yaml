# Tracked competitor products
#
# HOW TO ADD A PRODUCT:
#   1. Find the product on Walmart.com or Amazon.com
#   2. Copy the full product URL
#   3. Get the retailer_id: Walmart item ID is in the URL (/ip/.../XXXXXXXX)
#      Amazon ASIN is the 10-character ID in the URL (/dp/XXXXXXXXXX)
#   4. Add a new entry below following the same format
#   5. UPC is optional but helps link the same product across retailers
#
# POC GATE: Only the first product (walmart) is needed to validate Walmart scraping.
# Replace the placeholder URL with a real Walmart product URL before running the POC.

products:
  # --- Yellowbird ---
  - name: "Yellowbird Blue Agave Sriracha Hot Sauce 9.8 oz"
    brand: "Yellowbird"
    retailer: walmart
    url: "REPLACE_WITH_REAL_WALMART_URL"
    # Example URL format: https://www.walmart.com/ip/Yellowbird-Sriracha/XXXXXXXXX
    retailer_id: "REPLACE_WITH_ITEM_ID"
    upc: ""  # fill in if known

  - name: "Yellowbird Blue Agave Sriracha Hot Sauce 9.8 oz"
    brand: "Yellowbird"
    retailer: amazon
    url: "REPLACE_WITH_REAL_AMAZON_URL"
    # Example URL format: https://www.amazon.com/dp/XXXXXXXXXX
    retailer_id: "REPLACE_WITH_ASIN"
    upc: ""

