# fly.toml — competitive-shelf-intelligence
# Deploy: flyctl deploy
# Postgres setup (one-time):
#   flyctl postgres create --name competitive-shelf-pg --region iad
#   flyctl postgres attach competitive-shelf-pg --app competitive-shelf-intelligence
#   psql $DATABASE_URL -f db/schema.sql

app = "competitive-shelf-intelligence"
primary_region = "iad"

[build]

[env]
  PORT = "8050"
  CACHE_DIR = "/cache"

[http_service]
  internal_port = 8050
  force_https = true
  auto_stop_machines = "off"
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "10s"

[[mounts]]
  source = "cache_vol"
  destination = "/cache"

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 1

[deploy]
  strategy = "immediate"
